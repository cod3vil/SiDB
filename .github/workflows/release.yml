name: Release

# 打 tag（如 v0.1.0）时触发：在各平台构建安装包并发布到一个「草稿」GitHub Release。
#   git tag v0.1.0 && git push origin v0.1.0
# 发布前可在 Releases 页面核对产物，再点 Publish。
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon (arm64)
            target: aarch64-apple-darwin
          - platform: macos-13 # Intel (x86_64)
            target: x86_64-apple-darwin
          - platform: windows-latest # Windows x64 (msi + nsis)
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo (per target)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build & publish (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 自动更新签名（在仓库 Settings → Secrets 配置）：
          #   TAURI_SIGNING_PRIVATE_KEY          ~/.tauri/sidb.key 的内容
          #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD 私钥密码（无则留空）
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS 代码签名 + 公证（仅 macOS job 生效；未配置时为空 → 退回 ad-hoc）：
          #   APPLE_CERTIFICATE           Developer ID Application 证书 .p12 的 base64
          #   APPLE_CERTIFICATE_PASSWORD  导出 .p12 时设的密码
          #   APPLE_SIGNING_IDENTITY      形如 "Developer ID Application: 名字 (TEAMID)"
          #   APPLE_ID / APPLE_PASSWORD   Apple ID + App 专用密码（公证用）
          #   APPLE_TEAM_ID               10 位团队 ID
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SiDB ${{ github.ref_name }}"
          releaseBody: |
            按平台下载安装包：
            - macOS（Apple Silicon / Intel）：`.dmg`
            - Windows：`.msi` 或 `.exe`（NSIS）

            注：若系统提示来源未验证，macOS 可在「系统设置 → 隐私与安全性」放行，Windows 可能出现 SmartScreen 提示（取决于是否已配置代码签名）。
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
